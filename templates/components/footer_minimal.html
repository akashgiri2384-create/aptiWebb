<!-- Global Overlay System -->
<style>
    .g-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        animation: gFadeIn 0.2s ease-out;
    }

    .g-modal-content {
        background: #1e293b;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 32px;
        max-width: 90%;
        width: 360px;
        text-align: center;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        animation: gScaleIn 0.2s ease-out;
    }

    .g-modal-icon {
        font-size: 3rem;
        margin-bottom: 16px;
        display: block;
    }

    .g-modal-title {
        color: white;
        font-size: 1.25rem;
        font-weight: 700;
        margin: 0 0 12px;
    }

    .g-modal-msg {
        color: #94a3b8;
        margin-bottom: 24px;
        font-size: 1rem;
        line-height: 1.5;
    }

    .g-modal-btn {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: #6366f1;
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .g-modal-btn:hover {
        background: #4f46e5;
        transform: translateY(-1px);
    }

    .g-modal-btn:active {
        transform: translateY(0);
    }

    @keyframes gFadeIn {
        from {
            opacity: 0;
        }

        to {
            opacity: 1;
        }
    }

    @keyframes gScaleIn {
        from {
            transform: scale(0.95);
            opacity: 0;
        }

        to {
            transform: scale(1);
            opacity: 1;
        }
    }
</style>

<div id="g-alert-modal" class="g-modal-overlay">
    <div class="g-modal-content">
        <span class="g-modal-icon" id="g-alert-icon">🔔</span>
        <h3 class="g-modal-title" id="g-alert-title">Notification</h3>
        <p class="g-modal-msg" id="g-alert-msg">Message goes here.</p>
        <button class="g-modal-btn" onclick="closeAppAlert()">Okay</button>
    </div>
</div>

<script>
    window.showAppAlert = function (message, title = 'Notification', type = 'info') {
        const modal = document.getElementById('g-alert-modal');
        const titleEl = document.getElementById('g-alert-title');
        const msgEl = document.getElementById('g-alert-msg');
        const iconEl = document.getElementById('g-alert-icon');

        titleEl.textContent = title;
        msgEl.textContent = message;

        if (type === 'error') {
            iconEl.textContent = '⚠️';
            titleEl.style.color = '#ef4444';
        } else if (type === 'success') {
            iconEl.textContent = '✅';
            titleEl.style.color = '#10b981';
        } else {
            iconEl.textContent = '🔔';
            titleEl.style.color = 'white';
        }

        modal.style.display = 'flex';
    };

    window.closeAppAlert = function () {
        document.getElementById('g-alert-modal').style.display = 'none';
    };

    // Override native alert (Optional, but ensures strict compliance)
    window.alert = function (msg) {
        showAppAlert(msg);
    };
</script>
