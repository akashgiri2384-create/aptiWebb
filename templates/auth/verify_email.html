<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Email Verification - Indira Quiz</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            margin-bottom: 1rem;
            color: #2d3748;
        }

        p {
            color: #718096;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background-color: #4299e1;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #3182ce;
        }

        .success {
            color: #38a169;
        }

        .error {
            color: #e53e3e;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="container">
        {% if success %}
        <div class="icon">✅</div>
        <h1 class="success">Verified!</h1>
        <p>{{ message }}</p>
        <a href="/login" class="btn">Go to Login</a>
        {% else %}
        <div class="icon">❌</div>
        <h1 class="error">Verification Failed</h1>
        <p>{{ message }}</p>
        <a href="/register" class="btn">Back to Registration</a>
        {% endif %}
    </div>
</body>

</html>
