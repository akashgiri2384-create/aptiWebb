{% extends "base.html" %}

{% block body %}
<div class="auth-container"
    style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="card"
        style="max-width: 450px; width: 100%; padding: 30px; background: rgba(30, 30, 40, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2
                style="font-size: 24px; font-weight: 700; margin-bottom: 10px; background: linear-gradient(135deg, #FFD700, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                Reset Password</h2>
            <p style="color: #a0a0b0; font-size: 14px;">Enter your new password below.</p>
        </div>

        <form method="post" id="resetForm">
            {% csrf_token %}

            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; color: #e0e0e0; margin-bottom: 8px; font-size: 14px;">New Password</label>
                <input type="password" name="new_password" required
                    style="width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; outline: none; transition: border-color 0.3s;">
            </div>

            <div class="form-group" style="margin-bottom: 25px;">
                <label style="display: block; color: #e0e0e0; margin-bottom: 8px; font-size: 14px;">Confirm
                    Password</label>
                <input type="password" name="confirm_password" required
                    style="width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: white; outline: none; transition: border-color 0.3s;">
            </div>

            {% if error %}
            <div
                style="background: rgba(220, 53, 69, 0.1); border: 1px solid rgba(220, 53, 69, 0.3); color: #ff6b6b; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; text-align: center;">
                {{ error }}
            </div>
            {% endif %}

            <button type="submit"
                style="width: 100%; padding: 14px; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.3s;">
                Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
