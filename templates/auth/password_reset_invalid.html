{% extends "base.html" %}

{% block body %}
<div class="auth-container"
    style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="card"
        style="max-width: 450px; width: 100%; padding: 40px 30px; background: rgba(30, 30, 40, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; text-align: center;">

        <div
            style="width: 60px; height: 60px; background: rgba(220, 53, 69, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#dc3545" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
        </div>

        <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 10px; color: #fff;">Invalid Link</h2>

        <p style="color: #a0a0b0; font-size: 15px; line-height: 1.5; margin-bottom: 20px;">
            This password reset link is invalid or has expired.
        </p>

        <a href="#" style="color: #6366f1; text-decoration: none; font-size: 14px;">Request a new link in the app</a>
    </div>
</div>
{% endblock %}
