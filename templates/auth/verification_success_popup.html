<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Email Verified - Indira Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 90%;
            border: 1px solid #334155;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        h1 {
            color: #4ade80;
            margin: 0 0 10px;
            font-size: 1.8rem;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            background: #6366f1;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            display: inline-block;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .sub-link {
            display: block;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #64748b;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="card">
        <span class="icon">✅</span>
        <h1>Email Verified!</h1>
        <p>Your email <strong>{{ email }}</strong> has been verified successfully.</p>

        <p style="background: rgba(99, 102, 241, 0.1); padding: 10px; border-radius: 8px; border: 1px dashed #6366f1;">
            👉 <strong>Action Required:</strong><br>
            Close this tab and return to your Application.
        </p>
    </div>
</body>

</html>
