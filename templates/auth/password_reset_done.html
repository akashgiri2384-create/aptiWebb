{% extends "base.html" %}

{% block body %}
<div class="auth-container"
    style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div class="card"
        style="max-width: 450px; width: 100%; padding: 40px 30px; background: rgba(30, 30, 40, 0.95); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; text-align: center;">

        <div
            style="width: 60px; height: 60px; background: rgba(16, 185, 129, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 6L9 17l-5-5"></path>
            </svg>
        </div>

        <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 10px; color: #fff;">Password Reset!</h2>

        <p style="color: #a0a0b0; font-size: 15px; line-height: 1.5; margin-bottom: 30px;">
            Your password has been changed successfully.<br>
            You can now return to the app and login with your new password.
        </p>
    </div>
</div>
{% endblock %}
