services:
  - type: web
    name: aptiweb
    env: python
    region: singapore
    plan: starter
    buildCommand: "./build.sh"
    startCommand: "gunicorn -c gunicorn_config.py quizzy.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: aptiweb-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: aptiweb-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: aptiweb-redis
          property: connectionString

databases:
  - name: aptiweb-db
    databaseName: quizzy
    user: quizzy_user
    plan: starter

# Optional: Add Redis if you want caching/Celery (Costs extra on Render, or use free tier if available)
# If avoiding cost, remove this and update settings.py to fallback to LocalMemCache
# services:
#   - type: redis
#     name: aptiweb-redis
#     plan: free # or starter
